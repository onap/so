# will be used as entry in DB to say SITE OFF/ON for healthcheck
security:
  basic:
    enabled: false
server:
    port: 8080
    tomcat:
        max-threads: 50
ssl-enable: false
mso:
  adapters:
    requestDb:
      auth: Basic YnBlbDptc28tZGItMTUwNyE=
      endpoint: http://localhost:8081
  logPath: logs
  site-name: localSite
  infra-requests:
    archived:
      period: 0
spring:
  datasource:
    jdbcUrl: jdbc:mariadb://localhost:3307/requestdb
    username: root
    password: password
    driver-class-name: org.mariadb.jdbc.Driver
    initialize: true
  sql:
    init:
      mode: never
  liquibase:
    change-log: classpath:db/changelog/db.changelog-test.xml
    url: jdbc:mariadb://localhost:3307/requestdb
    user: root
    password: password
  jpa:
    generate-ddl: false
    show-sql: false
    hibernate:
      # 'none', not 'validate': the schema is authoritatively created by the same Liquibase
      # migrations used in production, and repository tests exercise the entity mappings against it.
      # Hibernate 6.6 (Spring Boot 3.5) schema-validation is incompatible with this module's
      # hand-rolled multi-datasource EntityManagerFactory + embedded MariaDB4j: it reports every
      # Liquibase-created table as "missing" even though JDBC metadata finds them (catalog=<db>,
      # schema=null). The sibling catalog-db-adapter, which lets Boot auto-configure its EMF,
      # validates the same style of entities fine — so this is a test-EMF/Hibernate-6.6 quirk, not a
      # mapping defect. Production is unaffected (real MariaDB, pre-existing schema).
      ddl-auto: none
      naming-strategy: org.hibernate.cfg.ImprovedNamingStrategy
      enable-lazy-load-no-trans: true
    database-platform: org.hibernate.dialect.MySQLDialect
  security:
    usercredentials:
    -
      username: bpel
      password: '$2a$12$1xyutEZNfjGewIZRfKaE8eZE99f5sYFUmmM80BobI65KNjmcK0JuO'
      role: BPEL-Client
    -
      username: mso_admin
      password: '$2a$12$tidKuu.h88E2nuL95pTVY.ZOYMN/1dp29A9b1o.0GFDsVVSYlMkHa'
      role: ACTUATOR
mariaDB4j:
  dataDir:
  port: 3307
  databaseName: requestdb

management:
  endpoints:
    web:
      base-path: /manage
  server:
    servlet:
      context-path: /manage
  metrics:
    se-global-registry: false
    export:
      prometheus:
        enabled: true # Whether exporting of metrics to Prometheus is enabled.
        step: 1m # Step size (i.e. reporting frequency) to use.
