server:
  port: 8080
  tomcat:
    max-threads: 50
mso:
  infra:
    auditInventory: false
  camundaAuth: ${CAMUNDA_AUTH}
spring:
  datasource:
    hikari:
      jdbcUrl: jdbc:mariadb://${DB_HOST}:${DB_PORT}/camundabpmn
      username: ${DB_ADMIN_USERNAME}
      password: ${DB_ADMIN_PASSWORD}
      driver-class-name: org.mariadb.jdbc.Driver
      pool-name: bpmn-pool
      registerMbeans: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT}/camundabpmn
    user: ${DB_ADMIN_USERNAME}
    password: ${DB_ADMIN_PASSWORD}
  http:
    multipart:
      enabled: false
  jersey:
    application-path: /sobpmnengine
  main:
    allow-bean-definition-overriding: true
camunda:
  bpm:
    database:
      schema-update: false
    application:
      delete-upon-undeploy: false
      scan-for-process-definitions: true
      deploy-changed-only: true
    job-execution:
      deployment-aware: true
    generic-properties:
      properties:
        enforce-history-time-to-live: false
#Actuator
management:
  endpoints:
    web:
      base-path: /manage
      exposure:
        include: "*"
  metrics:
    se-global-registry: false
    export:
      prometheus:
        enabled: true # Whether exporting of metrics to Prometheus is enabled.
        step: 1m # Step size (i.e. reporting frequency) to use.
org:
  onap:
    so:
      adapters:
        network:
