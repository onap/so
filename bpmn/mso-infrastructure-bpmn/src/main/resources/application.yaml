server:
  port: 8080
  tomcat:
    max-threads: 50
mso:
  infra:
    auditInventory: false
  camundaAuth: ${CAMUNDA_AUTH}
spring:
  datasource:
    hikari:
      jdbcUrl: jdbc:mariadb://${DB_HOST}:${DB_PORT}/camundabpmn
      username: ${DB_ADMIN_USERNAME}
      password: ${DB_ADMIN_PASSWORD}
      driver-class-name: org.mariadb.jdbc.Driver
      pool-name: bpmn-pool
      registerMbeans: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    url: jdbc:mariadb://${DB_HOST}:${DB_PORT}/camundabpmn
    user: ${DB_ADMIN_USERNAME}
    password: ${DB_ADMIN_PASSWORD}
  http:
    multipart:
      enabled: false
  jersey:
    application-path: /sobpmnengine
  main:
    allow-bean-definition-overriding: true
camunda:
  bpm:
    database:
      schema-update: false
      jdbc-batch-processing: false
      # Camunda 7.23 no longer auto-derives the DB type from the MariaDB product name
      # (NullValueException: couldn't deduct database type ... 'MariaDB'); pin it to mysql
      # (Camunda treats MariaDB as mysql).
      type: mysql
    application:
      delete-upon-undeploy: false
      scan-for-process-definitions: true
      deploy-changed-only: true
    job-execution:
      deployment-aware: true
    generic-properties:
      properties:
        enforce-history-time-to-live: false
        # Camunda 7.23 enforces the DB transaction isolation level at engine startup (ENGINE-12019),
        # aborting the context if it is not READ_COMMITTED. MariaDB defaults to REPEATABLE_READ, so
        # skip the check to avoid a startup crash (same masking class as the historyTimeToLive and
        # jdbc-batch-processing fixes). Set the isolation level on the DB if strict checking is wanted.
        skipIsolationLevelCheck: true
#Actuator
management:
  endpoints:
    web:
      base-path: /manage
      exposure:
        include: "*"
  metrics:
    se-global-registry: false
    export:
      prometheus:
        enabled: true # Whether exporting of metrics to Prometheus is enabled.
        step: 1m # Step size (i.e. reporting frequency) to use.
org:
  onap:
    so:
      adapters:
        network:
